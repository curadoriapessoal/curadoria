<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Curadoria 800x800</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    
    <style>
        /* Layout 100% Preto */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
        }

        #auth_button { 
            padding: 20px 40px; 
            font-size: 1.2rem; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* Container ajustado para a proporção 800x800 + footer */
        #catalog-container { 
            position: relative; 
            width: 800px; 
            height: 920px; /* 800 da foto + espaço das estrelas */
            perspective: 1000px; 
            display: none;
        }

        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: #000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: transform 0.3s ease, opacity 0.3s ease; 
            touch-action: none;
        }

        .card img { 
            width: 800px; 
            height: 800px; 
            object-fit: contain;
            pointer-events: none;
            user-select: none;
        }

        /* Footer das Estrelas - 95% da largura */
        .star-footer {
            width: 95%; 
            height: 100px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-top: 10px;
        }

        .star-btn {
            background: none; 
            border: none; 
            font-size: 80px; /* Estrelas gigantes */
            color: #333; /* Estrela vazia (cinza escuro) */
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.1s, transform 0.1s;
        }

        .star-btn:active { transform: scale(1.2); }
        .star-btn.active { color: #fff; } /* Estrela preenchida (branco) */

        /* Feedback visual no swipe */
        .status-label {
            position: absolute; top: 350px; padding: 20px; border: 5px solid;
            border-radius: 10px; font-size: 4rem; font-weight: bold;
            opacity: 0; pointer-events: none; z-index: 10; text-transform: uppercase;
        }
        .like { color: #fff; border-color: #fff; left: 100px; }
        .nope { color: #444; border-color: #444; right: 100px; }
    </style>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">ENTRAR NO CATÁLOGO</button>
    
    <div id="catalog-container"></div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.metadata https://www.googleapis.com/auth/drive.readonly';
        
        const FOLDER_DESTINATIONS = {
            1: '1JFV-aW8cl_wb1uE2St4-rrv78t2NwvZH',
            2: '1hQNmdtdyOcI4qjP6uIqv37Q4qY7JIFGX',
            3: '1HwsVXHF9I6tA5RfzmDT7L9BBo84lTJTL',
            4: '1NWh7zR7V5c0qSqb2XyYUS_SJ2F8ojY6R',
            5: '1Auv1qacvBwtQBIZSNJvkblm5XogsSxo_'
        };

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        function gapiLoaded() { gapi.load('client', () => {
            gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] })
            .then(() => { gapiInited = true; maybeEnableButtons(); });
        });}

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                document.getElementById('auth_button').style.display = 'none';
                document.getElementById('catalog-container').style.display = 'block';
                await listPhotos();
            };
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function listPhotos() {
            const response = await gapi.client.drive.files.list({
                'pageSize': 30,
                'fields': 'files(id, name, thumbnailLink, parents)',
                'q': "mimeType contains 'image/' and trashed = false"
            });
            renderStack(response.result.files);
        }

        function renderStack(files) {
            const container = document.getElementById('catalog-container');
            container.innerHTML = '';
            
            files.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.zIndex = files.length - index;
                
                // Força miniatura de alta qualidade
                const imgUrl = file.thumbnailLink.replace('=s220', '=s800');

                card.innerHTML = `
                    <div class="status-label like">5 ★</div>
                    <div class="status-label nope">1 ★</div>
                    <img src="${imgUrl}">
                    <div class="star-footer" onpointerdown="event.stopPropagation()">
                        ${[1,2,3,4,5].map(num => `
                            <button class="star-btn" onclick="rateAndMove('${file.id}', ${num}, this)">★</button>
                        `).join('')}
                    </div>
                `;
                
                setupSwipe(card, file.id);
                container.appendChild(card);
            });
        }

        function setupSwipe(el, fileId) {
            const hammer = new Hammer(el);
            const likeLabel = el.querySelector('.like');
            const nopeLabel = el.querySelector('.nope');

            hammer.on('pan', (e) => {
                el.style.transition = 'none';
                el.style.transform = `translateX(${e.deltaX}px) rotate(${e.deltaX / 20}deg)`;
                if (e.deltaX > 50) { likeLabel.style.opacity = e.deltaX / 200; }
                else if (e.deltaX < -50) { nopeLabel.style.opacity = Math.abs(e.deltaX) / 200; }
            });

            hammer.on('panend', (e) => {
                el.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                if (e.deltaX > 200) { animateOut(el, fileId, 5, 1000); }
                else if (e.deltaX < -200) { animateOut(el, fileId, 1, -1000); }
                else {
                    el.style.transform = '';
                    likeLabel.style.opacity = 0; nopeLabel.style.opacity = 0;
                }
            });
        }

        async function rateAndMove(fileId, rating, btn) {
            const card = btn.closest('.card');
            // Feedback visual imediato nas estrelas
            const stars = card.querySelectorAll('.star-btn');
            stars.forEach((s, idx) => s.classList.toggle('active', idx < rating));
            
            // Animação de saída (para baixo)
            animateOut(card, fileId, rating, 0, 800);
        }

        async function animateOut(el, fileId, rating, x, y = 0) {
            el.style.transform = `translate(${x}px, ${y}px) rotate(${x/10}deg)`;
            el.style.opacity = '0';
            
            // Lógica de Movimentação no Drive
            try {
                // 1. Pega a pasta atual para remover
                const fileData = await gapi.client.drive.files.get({ fileId: fileId, fields: 'parents' });
                const oldParents = fileData.result.parents ? fileData.result.parents.join(',') : '';
                const newParent = FOLDER_DESTINATIONS[rating];

                // 2. Move e Atualiza Metadado
                await gapi.client.drive.files.update({
                    fileId: fileId,
                    addParents: newParent,
                    removeParents: oldParents,
                    resource: { properties: { 'star_rating': rating.toString() } }
                });
                console.log(`Sucesso: ${fileId} -> Folder ${rating}`);
            } catch (e) { console.error("Erro na API:", e); }

            setTimeout(() => {
                el.remove();
                if (document.querySelectorAll('.card').length === 0) listPhotos();
            }, 400);
        }
    </script>
</body>
</html>
