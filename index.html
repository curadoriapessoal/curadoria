<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Curadoria Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    
    <style>
        /* Layout Full Black & Centered */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
        }

        #auth_button { 
            padding: 20px 40px; 
            background: #fff; 
            border-radius: 50px; 
            font-weight: bold;
            cursor: pointer;
        }

        /* Barra de Topo com Botões Dinâmicos */
        #top-bar {
            position: fixed;
            top: 20px;
            z-index: 999999;
            display: none; /* Aparece após o login */
            width: 100%;
            justify-content: center;
            gap: 15px; /* Espaço entre os botões */
        }

        .top-btn {
            padding: 10px 20px;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 0.9rem;
            transition: transform 0.2s ease;
        }
        
        .top-btn:active { transform: scale(0.95); }

        #refresh_button_top { background: #28a745; }
        #undo_button_top { background: #dc3545; display: none; /* Oculto até haver ações */ }

        /* Container Responsivo */
        #tinder-container { 
            position: relative; 
            width: 90vw; 
            max-width: 800px; 
            aspect-ratio: 1 / 1.2; 
            display: none;
        }

        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: #000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            transition: transform 0.3s ease, opacity 0.3s ease; 
            touch-action: none;
        }

        .card img { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            pointer-events: none;
            border-radius: 8px; /* Cantos levemente arredondados pra estética */
        }

        /* Footer das Estrelas */
        .star-footer {
            width: 95%; 
            display: flex; 
            justify-content: space-between; 
            margin-top: 20px;
        }

        .star-btn {
            background: none; 
            border: none; 
            font-size: 12vw; 
            max-size: 80px;
            color: #222; 
            cursor: pointer;
            padding: 0;
            transition: color 0.2s ease;
        }

        .star-btn.active { color: #fff; }

        /* Labels de Feedback */
        .status-label {
            position: absolute; top: 40%; padding: 10px; border: 4px solid;
            border-radius: 10px; font-size: 2rem; font-weight: bold;
            opacity: 0; z-index: 10; pointer-events: none;
        }
        .like { color: #fff; border-color: #fff; left: 10px; }
        .nope { color: #444; border-color: #444; right: 10px; }
        
        /* Mensagem de Fim e Botão de Refresh */
        #end-screen {
            position: absolute;
            top: 40%;
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 0;
        }

        #empty-message {
            font-size: 1.5rem;
            color: #888;
            text-align: center;
        }

        #refresh_button {
            padding: 15px 30px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">ABRIR PASTA DE ENTRADA</button>
    
    <div id="top-bar">
        <button id="undo_button_top" class="top-btn" onclick="undoLastAction()">↩️ DESFAZER</button>
        <button id="refresh_button_top" class="top-btn" onclick="reloadFolder()">🔄 SINCRONIZAR NOVOS</button>
    </div>

    <div id="tinder-container">
        <div id="end-screen">
            <div id="empty-message">A pasta está vazia ou os arquivos acabaram!</div>
            <button id="refresh_button" onclick="reloadFolder()">BUSCAR NOVAS FOTOS</button>
        </div>
    </div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive'; 
        
        // --- CONFIGURAÇÃO DE PASTAS ---
        const SOURCE_FOLDER_ID = '1C0Kt0kLFr_Ka4XK-UhRfquwxhysXbyTd'; 
        const FOLDER_DESTINATIONS = {
            1: '1JFV-aW8cl_wb1uE2St4-rrv78t2NwvZH',
            2: '1hQNmdtdyOcI4qjP6uIqv37Q4qY7JIFGX',
            3: '1HwsVXHF9I6tA5RfzmDT7L9BBo84lTJTL',
            4: '1NWh7zR7V5c0qSqb2XyYUS_SJ2F8ojY6R',
            5: '1Auv1qacvBwtQBIZSNJvkblm5XogsSxo_'
        };

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        let nextPageToken = null;
        let isFetching = false;
        let currentZIndex = 100000; 
        let undoZIndex = 200000; // Garante que a foto desfeita apareça na frente de tudo
        
        const processedIds = new Set(); 
        let actionHistory = []; // Guarda as ações para permitir o "Desfazer"

        function gapiLoaded() { gapi.load('client', () => {
            gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] })
            .then(() => { gapiInited = true; maybeEnableButtons(); });
        });}

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                document.getElementById('auth_button').style.display = 'none';
                document.getElementById('tinder-container').style.display = 'block';
                document.getElementById('top-bar').style.display = 'flex'; 
                await listPhotos();
            };
            tokenClient.requestAccessToken({prompt: 'consent'}); 
        }

        async function listPhotos() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('end-screen').style.display = 'none';

            const query = `'${SOURCE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`;
            const requestParams = {
                'pageSize': 100, 
                'fields': 'nextPageToken, files(id, name, thumbnailLink, parents)', 
                'q': query
            };

            if (nextPageToken) {
                requestParams.pageToken = nextPageToken;
            }
            
            try {
                const response = await gapi.client.drive.files.list(requestParams);
                nextPageToken = response.result.nextPageToken || null;
                addCardsToStack(response.result.files);
            } catch (e) { 
                console.error("Erro na busca:", e); 
            } finally {
                isFetching = false;
            }
        }

        function addCardsToStack(files) {
            const container = document.getElementById('tinder-container');
            const endScreen = document.getElementById('end-screen');

            if (!files || files.length === 0) { 
                if (document.querySelectorAll('.card').length === 0) {
                    endScreen.style.display = 'flex';
                }
                return; 
            }

            let addedCount = 0;

            files.forEach((file) => {
                if (processedIds.has(file.id)) return;
                processedIds.add(file.id);
                addedCount++;

                const card = createCardElement(file.id, file.thumbnailLink.replace('=s220', '=s800'));
                card.style.zIndex = currentZIndex--; 
                container.appendChild(card);
            });

            if (addedCount === 0 && document.querySelectorAll('.card').length === 0) {
                if (nextPageToken) {
                    listPhotos();
                } else {
                    endScreen.style.display = 'flex';
                }
            }
        }

        // Função isolada para criar a estrutura do card HTML (usada ao puxar fotos novas e ao desfazer)
        function createCardElement(fileId, imgUrl) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="status-label like">TOP</div>
                <div class="status-label nope">LIXO</div>
                <img src="${imgUrl}">
                <div class="star-footer" onpointerdown="event.stopPropagation()">
                    ${[1,2,3,4,5].map(num => `
                        <button class="star-btn" onclick="rateAndMove('${fileId}', ${num}, this)">★</button>
                    `).join('')}
                </div>
            `;
            setupSwipe(card, fileId);
            return card;
        }

        function setupSwipe(el, fileId) {
            const hammer = new Hammer(el);
            const likeLabel = el.querySelector('.like');
            const nopeLabel = el.querySelector('.nope');

            hammer.on('pan', (e) => {
                el.style.transition = 'none';
                el.style.transform = `translateX(${e.deltaX}px) rotate(${e.deltaX / 25}deg)`;
                if (e.deltaX > 50) likeLabel.style.opacity = e.deltaX / 200;
                else if (e.deltaX < -50) nopeLabel.style.opacity = Math.abs(e.deltaX) / 200;
            });

            hammer.on('panend', (e) => {
                el.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                if (e.deltaX > 150) animateOut(el, fileId, 5, 1000);
                else if (e.deltaX < -150) animateOut(el, fileId, 1, -1000);
                else {
                    el.style.transform = '';
                    likeLabel.style.opacity = 0; nopeLabel.style.opacity = 0;
                }
            });
        }

        async function rateAndMove(fileId, rating, btn) {
            const card = btn.closest('.card');
            const stars = card.querySelectorAll('.star-btn');
            stars.forEach((s, idx) => s.classList.toggle('active', idx < rating));
            animateOut(card, fileId, rating, 0, 800);
        }

        async function animateOut(el, fileId, rating, x, y = 0) {
            el.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`;
            el.style.opacity = '0';
            const imgUrl = el.querySelector('img').src;
            
            try {
                const newParent = FOLDER_DESTINATIONS[rating];
                await gapi.client.drive.files.update({
                    fileId: fileId,
                    addParents: newParent,
                    removeParents: SOURCE_FOLDER_ID
                });
                
                // Salva no histórico APÓS o sucesso do Google Drive
                actionHistory.push({ fileId: fileId, destination: newParent, imgUrl: imgUrl });
                updateUndoButtonState();
                console.log(`Sucesso: Arquivo movido para pasta ${rating}`);
            } catch (e) { 
                console.error("Erro ao mover:", e); 
                alert("ERRO AO MOVER PARA O DRIVE! O arquivo continua na origem.");
            }

            setTimeout(() => {
                el.remove();
                checkAndFetchMore();
            }, 400);
        }

        // ---- LÓGICA DE DESFAZER AÇÃO ----
        async function undoLastAction() {
            if (actionHistory.length === 0) return;
            
            // Pega a última ação da array de histórico
            const lastAction = actionHistory.pop();
            updateUndoButtonState();

            // Devolve o arquivo para a pasta origem no Drive
            try {
                await gapi.client.drive.files.update({
                    fileId: lastAction.fileId,
                    addParents: SOURCE_FOLDER_ID,
                    removeParents: lastAction.destination
                });
                console.log(`Desfeito: Arquivo retornou à origem.`);
            } catch (e) {
                console.error("Erro ao desfazer ação no Drive:", e);
                alert("Não foi possível devolver o arquivo à origem no Drive.");
                return; // Se falhou a volta, aborta para não criar erro de sincronia
            }

            // Remove o ID do Set de "processados" pra ele não ser ignorado
            processedIds.delete(lastAction.fileId);

            // Tira a tela de 'vazio' caso ela esteja visível
            document.getElementById('end-screen').style.display = 'none';

            // Recria a carta visualmente
            const container = document.getElementById('tinder-container');
            const card = createCardElement(lastAction.fileId, lastAction.imgUrl);
            
            // Coloca ela garantidamente no topo da pilha atual
            card.style.zIndex = undoZIndex++; 
            
            // Animação de entrada (surgindo no meio da tela)
            card.style.transform = 'scale(0.8)';
            card.style.opacity = '0';
            container.appendChild(card);

            // Força a renderização do frame para a transição acontecer suavemente
            requestAnimationFrame(() => {
                card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                card.style.transform = 'scale(1)';
                card.style.opacity = '1';
            });
        }

        // Controla se o botão de "Desfazer" deve aparecer
        function updateUndoButtonState() {
            const undoBtn = document.getElementById('undo_button_top');
            if (actionHistory.length > 0) {
                undoBtn.style.display = 'inline-block';
            } else {
                undoBtn.style.display = 'none';
            }
        }

        function checkAndFetchMore() {
            const remainingCards = document.querySelectorAll('.card').length;
            
            if (remainingCards <= 50 && nextPageToken) {
                listPhotos();
            } else if (remainingCards === 0 && !nextPageToken) {
                document.getElementById('end-screen').style.display = 'flex';
            }
        }

        function reloadFolder() {
            const container = document.getElementById('tinder-container');
            const cards = container.querySelectorAll('.card');
            cards.forEach(c => c.remove());
            
            nextPageToken = null; 
            processedIds.clear();
            actionHistory = []; // Ao recarregar do zero, perde-se o histórico antigo
            updateUndoButtonState();
            
            document.getElementById('end-screen').style.display = 'none'; 
            listPhotos(); 
        }
    </script>
</body>
</html>
