<!DOCTYPE html>
<html>
<head>
    <title>Meu Catálogo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    
    <style>
        /* Estilos para a barra de estrelas */
        .star-bar {
            width: 100%; display: flex; justify-content: space-around; 
            padding: 10px 0; background: #fafafa; border-top: 1px solid #eee;
            z-index: 20; /* Fica acima do swipe */
        }
        .star-btn {
            background: none; border: none; font-size: 1.5rem; color: #ccc;
            cursor: pointer; padding: 5px 10px; transition: transform 0.1s;
        }
        .star-btn:active { transform: scale(1.3); }
        .star-btn[data-val="0"] { font-size: 1.2rem; font-weight: bold; color: #999; }
                
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.2rem; color: #333; margin: 10px 0; }
        
        #auth_button { padding: 15px 25px; font-size: 18px; cursor: pointer; display: none; background: #4285f4; color: white; border: none; border-radius: 5px; margin-top: 50px; }
        
        /* Container da Pilha de Cartões */
        #catalog-container { 
            position: relative; width: 90vw; max-width: 350px; height: 70vh; 
            margin-top: 20px; perspective: 1000px; 
        }

        .card { 
            position: absolute; width: 100%; height: 100%; background: white;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            transition: transform 0.3s ease; touch-action: none; cursor: grab;
            overflow: hidden; border: 1px solid #eee;
        }

        .card img { 
            width: 100%; height: 85%; object-fit: cover; pointer-events: none; 
            border-bottom: 1px solid #f0f0f0;
        }

        .card-info { padding: 10px; font-size: 0.9rem; color: #666; font-weight: bold; }

        /* Indicadores de Feedback */
        .status-label {
            position: absolute; top: 40px; padding: 10px 20px; border: 4px solid;
            border-radius: 10px; font-size: 2rem; font-weight: bold; text-transform: uppercase;
            opacity: 0; pointer-events: none; z-index: 10;
        }
        .like { color: #4caf50; border-color: #4caf50; left: 20px; transform: rotate(-20deg); }
        .nope { color: #f44336; border-color: #f44336; right: 20px; transform: rotate(20deg); }
    </style>
</head>
<body>

    <h1>Meu Catálogo</h1>
    <button id="auth_button" onclick="handleAuthClick()">Conectar com Google Drive</button>
    
    <div id="catalog-container">
        </div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.metadata https://www.googleapis.com/auth/drive.readonly';

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            gapiInited = true;
            maybeEnableButtons();
        }
        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }
        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'inline-block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) throw (resp);
                document.getElementById('auth_button').style.display = 'none';
                await listPhotos();
            };
            tokenClient.requestAccessToken({prompt: gapi.client.getToken() === null ? 'consent' : ''});
        }

        async function listPhotos() {
            try {
                const response = await gapi.client.drive.files.list({
                    'pageSize': 50,
                    'fields': 'files(id, name, thumbnailLink)',
                    'q': "mimeType contains 'image/'"
                });
                renderStack(response.result.files);
            } catch (err) { alert(err.message); }
        }

        function renderStack(files) {
    const container = document.getElementById('tinder-container');
    container.innerHTML = '';
    
    if (!files || files.length === 0) {
        container.innerHTML = "Fim do catálogo!";
        return;
    }

    files.forEach((file, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.zIndex = files.length - index;
        
        const highResThumb = file.thumbnailLink.replace('=s220', '=s800');

        card.innerHTML = `
            <div class="status-label like">5 Estrelas</div>
            <div class="status-label nope">0 Estrelas</div>
            <img src="${highResThumb}">
            <div class="card-info">${file.name}</div>
            <div class="star-bar" onpointerdown="event.stopPropagation()">
                <button class="star-btn" data-val="0" onclick="rateFromButton(this, 0, '${file.id}')">0</button>
                <button class="star-btn" onclick="rateFromButton(this, 1, '${file.id}')">⭐</button>
                <button class="star-btn" onclick="rateFromButton(this, 2, '${file.id}')">⭐</button>
                <button class="star-btn" onclick="rateFromButton(this, 3, '${file.id}')">⭐</button>
                <button class="star-btn" onclick="rateFromButton(this, 4, '${file.id}')">⭐</button>
                <button class="star-btn" onclick="rateFromButton(this, 5, '${file.id}')">⭐</button>
            </div>
        `;
        
        setupSwipe(card, file.id);
        container.appendChild(card);
    });
}

// Função acionada ao clicar nas estrelas
function rateFromButton(btnElement, rating, fileId) {
    // Encontra o cartão atual a partir do botão clicado
    const card = btnElement.closest('.card');
    
    // Anima o cartão para baixo simulando que foi guardado
    finishSwipe(card, rating, fileId, 'translate(0, 800px) scale(0.8)');
}

        function setupSwipe(el, fileId) {
            const hammer = new Hammer(el);
            const likeLabel = el.querySelector('.like');
            const nopeLabel = el.querySelector('.nope');

            hammer.on('pan', (e) => {
                el.style.transition = 'none';
                const x = e.deltaX;
                const rotation = x / 15;
                el.style.transform = `translateX(${x}px) rotate(${rotation}deg)`;

                // Feedback visual das etiquetas
                if (x > 50) { likeLabel.style.opacity = x / 150; nopeLabel.style.opacity = 0; }
                else if (x < -50) { nopeLabel.style.opacity = Math.abs(x) / 150; likeLabel.style.opacity = 0; }
                else { likeLabel.style.opacity = 0; nopeLabel.style.opacity = 0; }
            });

            hammer.on('panend', (e) => {
                el.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                if (e.deltaX > 150) {
                    finishSwipe(el, 5, fileId, 'translate(1000px, 0) rotate(45deg)');
                } else if (e.deltaX < -150) {
                    finishSwipe(el, 1, fileId, 'translate(-1000px, 0) rotate(-45deg)');
                } else {
                    el.style.transform = '';
                    likeLabel.style.opacity = 0;
                    nopeLabel.style.opacity = 0;
                }
            });
        }

        async function finishSwipe(el, rating, fileId, transformStr) {
            el.style.transform = transformStr;
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 400);
            
            // Grava no Google Drive as "Properties"
            try {
                await gapi.client.drive.files.update({
                    fileId: fileId,
                    resource: { properties: { 'star_rating': rating.toString() } }
                });
                console.log(`Foto ${fileId} marcada com ${rating} estrelas`);
            } catch (err) { console.error("Erro ao salvar:", err); }
        }
    </script>
</body>
</html>
