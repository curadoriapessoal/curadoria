<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Editing Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    
    <style>
        /* Layout Principal */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-top: 2vh; 
        }

        #auth_button { 
            padding: 20px 40px; 
            background: #fff; 
            border: none;
            border-radius: 50px; 
            font-weight: bold;
            cursor: pointer;
            color: #000;
            box-shadow: 0 6px 0 #ccc, 0 10px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
            margin-top: 30vh; 
        }
        #auth_button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #ccc, 0 4px 6px rgba(0,0,0,0.5);
        }

        /* ---------------------------------------------------
           NAVEGAÇÃO DE PASTAS (TOP BAR)
           --------------------------------------------------- */
        /* ---------------------------------------------------
           NAVEGAÇÃO DE PASTAS (TOP BAR)
           --------------------------------------------------- */
        #folder-nav {
            width: 100%;
            display: none; 
            justify-content: center;
            align-items: center; /* Centraliza verticalmente se houver duas linhas */
            gap: 6px; /* Espaço um pouco menor para caber melhor no mobile */
            padding: 5px 10px;
            z-index: 1001;
            flex-wrap: wrap; /* A mágica: se não couber, ele joga o botão pra linha de baixo sem encavalar */
            box-sizing: border-box;
        }

        .folder-tab {
            background: #222;
            color: #888;
            border: 1px solid #444;
            padding: 8px 12px; /* Reduzido levemente */
            border-radius: 20px;
            font-size: 0.75rem; /* Fonte ajustada para mobile */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            white-space: nowrap; /* Impede que o texto dentro do próprio botão se divida em duas linhas */
        }

        .folder-tab.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .folder-tab {
            background: #222;
            color: #888;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .folder-tab.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Estilo específico para a lixeira */
        .btn-trash {
            background: transparent;
            border-color: rgba(220, 53, 69, 0.5); /* Vermelho sutil */
            font-size: 1rem;
            padding: 5px 10px;
        }
        .btn-trash:hover {
            background: rgba(220, 53, 69, 0.2);
            border-color: #dc3545;
        }

        /* ---------------------------------------------------
           CABEÇALHO (CONTADOR DISCRETO)
           --------------------------------------------------- */
        #info-bar {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 5px 0;
            z-index: 1000;
            pointer-events: none;
        }

        #photo-count {
            font-size: 1.2rem; 
            font-weight: bold;
            color: #aaa;
            text-shadow: 0 1px 3px rgba(0,0,0,1);
            display: none; 
        }

        /* ---------------------------------------------------
           CONTAINER DE FOTOS
           --------------------------------------------------- */
        #catalog-container { 
            position: relative; 
            width: 95vw; 
            height: 58vh; 
            margin-top: 1vh; 
            display: none;
            transition: opacity 0.3s ease; 
        }

        @media (min-width: 768px) {
            #catalog-container { width: 50vw; }
        }

        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out; 
        }

        .card img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto;
            height: auto;
            object-fit: contain; 
            pointer-events: none;
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        /* Zonas de Toque Laterais Invisíveis */
        .nav-zone {
            position: absolute;
            top: 0; bottom: 0;
            width: 35%; 
            display: none; 
            align-items: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            z-index: 500000; 
            transition: background 0.2s ease, color 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #nav-left { 
            left: 0; justify-content: flex-start; padding-left: 15px; 
            background: linear-gradient(to right, rgba(0,0,0,0.3), transparent);
        }
        #nav-right { 
            right: 0; justify-content: flex-end; padding-right: 15px; 
            background: linear-gradient(to left, rgba(0,0,0,0.3), transparent);
        }

        .nav-zone:active { color: rgba(255,255,255,1); background: rgba(255,255,255,0.1); }

        /* ---------------------------------------------------
           LAYOUT INFERIOR (BOTÕES DE AÇÃO)
           --------------------------------------------------- */
        #bottom-area {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 25px); 
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            z-index: 999999;
            pointer-events: none; 
        }

        #controls-wrapper {
            display: none; 
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            pointer-events: none;
        }

        .left-panel { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .right-panel { display: flex; flex-direction: row; gap: 10px; pointer-events: auto; }

        .solid-btn {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            touch-action: manipulation;
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .solid-btn:active { transform: scale(0.96) translateY(2px); }

        .btn-left-stack { width: 130px; height: 46px; border-radius: 12px; font-size: 0.8rem; letter-spacing: 0.5px; }
        
        .btn-undo { border-color: rgba(255, 193, 7, 0.2); box-shadow: 0 4px 15px rgba(255, 193, 7, 0.1); visibility: hidden; }
        .btn-sync { border-color: rgba(232, 62, 140, 0.2); box-shadow: 0 4px 15px rgba(232, 62, 140, 0.1); }

        .btn-right-action { width: 65px; height: 104px; flex-direction: column; border-radius: 16px; font-size: 0.65rem; gap: 8px; }
        .btn-right-action .icon { font-size: 1.4rem; }
        
        .btn-reject { border-color: rgba(220, 53, 69, 0.2); box-shadow: 0 4px 15px rgba(220, 53, 69, 0.1); }
        .btn-manter { border-color: rgba(13, 110, 253, 0.2); box-shadow: 0 4px 15px rgba(13, 110, 253, 0.1); }
        .btn-top { border-color: rgba(40, 167, 69, 0.2); box-shadow: 0 4px 15px rgba(40, 167, 69, 0.1); }

        /* Botão Ocultar Tela */
        #hide-strip { display: none; justify-content: center; width: 100%; pointer-events: none; }
        #hide-btn { background: rgba(128, 128, 128, 0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 10px 25px; border-radius: 25px; font-size: 0.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: auto; text-transform: uppercase; }

        #end-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; display: none; flex-direction: column; align-items: center; gap: 20px; z-index: 0; }
        #empty-message { font-size: 1.2rem; color: #888; text-align: center; margin-bottom: 10px;}

    </style>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">ABRIR PASTA</button>

    <div id="folder-nav">
        <button class="folder-tab btn-trash" onclick="emptyRejectFolder()" id="tab-trash" title="Esvaziar pasta Reject">🗑️</button>
        
        <button class="folder-tab active" onclick="switchFolder('source')" id="tab-source">Origem</button>
        <button class="folder-tab" onclick="switchFolder('manter')" id="tab-manter">Manter</button>
        <button class="folder-tab" onclick="switchFolder('top')" id="tab-top">Top</button>

        <button id="btn-sort" class="folder-tab" onclick="toggleSortOrder()">🔤 A-Z</button>
    </div>
    
    <div id="info-bar">
        <div id="photo-count">...</div>
    </div>

    <div id="catalog-container">
        
        <div id="nav-left" class="nav-zone" onclick="prevPhoto()">&#10094;</div>
        <div id="nav-right" class="nav-zone" onclick="nextPhoto()">&#10095;</div>

        <div id="end-screen">
            <div id="empty-message">A pasta está vazia!</div>
        </div>
    </div>

    <div id="bottom-area">
        <div id="controls-wrapper">
            <div class="left-panel">
                <button id="undo_button" class="solid-btn btn-left-stack btn-undo" onclick="undoLastAction()">↩ VOLTAR</button>
                <button class="solid-btn btn-left-stack btn-sync" onclick="reloadFolder()">🔄 SINCRONIZAR</button>
            </div>
            
            <div class="right-panel">
                <button class="solid-btn btn-right-action btn-red" onclick="handleGlobalAction(1)">
                    <span class="icon">🏴</span> REJECT
                </button>
                <button class="solid-btn btn-right-action btn-blue" onclick="handleGlobalAction(3)">
                    <span class="icon">📁</span> MANTER
                </button>
                <button class="solid-btn btn-right-action btn-green" onclick="handleGlobalAction(5)">
                    <span class="icon">🏳️</span> TOP
                </button>
            </div>
        </div>

        <div id="hide-strip">
            <button id="hide-btn" onclick="toggleVisibility()">OCULTAR TELA</button>
        </div>
    </div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive'; 
        
        const FOLDERS = {
            'source': '1C0Kt0kLFr_Ka4XK-UhRfquwxhysXbyTd',
            1: '1JFV-aW8cl_wb1uE2St4-rrv78t2NwvZH', // Reject
            3: '1HwsVXHF9I6tA5RfzmDT7L9BBo84lTJTL', // Manter
            5: '1Auv1qacvBwtQBIZSNJvkblm5XogsSxo_'  // Top
        };

        let activeFolderKey = 'source'; 
        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;
        let nextPageToken = null;
        let isFetching = false;
        let undoZIndex = 200000; 
        
        const processedIds = new Set(); 
        let actionHistory = []; 
        let totalPhotosInFolder = 0; 
        let currentViewIndex = 0;
        let isScreenHidden = false;
        let currentSortOrder = 'name'; // NOVO: Define A-Z como padrão

        function gapiLoaded() { gapi.load('client', () => {
            gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] })
            .then(() => { gapiInited = true; maybeEnableButtons(); });
        });}

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                document.getElementById('auth_button').style.display = 'none';
                document.getElementById('folder-nav').style.display = 'flex';
                document.getElementById('catalog-container').style.display = 'block';
                document.getElementById('controls-wrapper').style.display = 'flex'; 
                document.getElementById('hide-strip').style.display = 'flex'; 
                document.getElementById('photo-count').style.display = 'block'; 
                
                loadActiveFolder();
            };
            tokenClient.requestAccessToken(); 
        }

        function toggleVisibility() {
            const container = document.getElementById('catalog-container');
            isScreenHidden = !isScreenHidden;
            container.style.opacity = isScreenHidden ? '0.01' : '1';
        }

        function switchFolder(folderKey) {
            if (activeFolderKey === folderKey) return; 

            document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + folderKey).classList.add('active');

            activeFolderKey = folderKey;
            loadActiveFolder();
        }

        function loadActiveFolder() {
            const container = document.getElementById('catalog-container');
            container.querySelectorAll('.card').forEach(c => c.remove());
            
            nextPageToken = null; 
            currentViewIndex = 0;
            processedIds.clear();
            actionHistory = []; 
            updateUndoButtonState();
            
            document.getElementById('end-screen').style.display = 'none'; 
            fetchTotalCount();
            listPhotos();
        }

        function getVisibleCards() {
            return Array.from(document.querySelectorAll('.card:not(.animating)'));
        }

        function getActiveCard() {
            const cards = getVisibleCards();
            return cards[currentViewIndex] || null;
        }

        function updateCardsVisibility() {
            const cards = getVisibleCards();
            const navLeft = document.getElementById('nav-left');
            const navRight = document.getElementById('nav-right');

            if(cards.length === 0) {
                navLeft.style.display = 'none';
                navRight.style.display = 'none';
                return;
            }
            
            if (currentViewIndex >= cards.length) currentViewIndex = Math.max(0, cards.length - 1);
            if (currentViewIndex < 0) currentViewIndex = 0;

            cards.forEach((card, index) => {
                if (index === currentViewIndex) {
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                } else {
                    card.style.visibility = 'hidden';
                    card.style.opacity = '0';
                }
            });

            navLeft.style.display = currentViewIndex > 0 ? 'flex' : 'none';
            navRight.style.display = (currentViewIndex < cards.length - 1 || nextPageToken) ? 'flex' : 'none';
        }

        function prevPhoto() {
            if (currentViewIndex > 0) {
                currentViewIndex--;
                updateCardsVisibility();
            }
        }

        function nextPhoto() {
            const cards = getVisibleCards();
            if (currentViewIndex < cards.length - 1) {
                currentViewIndex++;
                updateCardsVisibility();
            } else if (nextPageToken) {
                listPhotos(); 
            }
        }

        document.addEventListener('keydown', (event) => {
            if (event.repeat) return; // Evita metralhar o teclado

            switch(event.key) {
                case 'ArrowLeft': prevPhoto(); break;
                case 'ArrowRight': nextPhoto(); break;
                
                // Lixeira (Reject)
                case 's': case 'S': case '4': handleGlobalAction(1); break;
                
                // Manter
                case 'd': case 'D': case '5': handleGlobalAction(3); break;
                
                // Top
                case 'f': case 'F': case '6': handleGlobalAction(5); break;
                
                // Sincronizar (Reload)
                case 'a': case 'A': case '1': reloadFolder(); break;
                
                // Desfazer (Undo)
                case 'r': case 'R': case '2': undoLastAction(); break;
                
                // Esvaziar Lixeira (Empty Trash)
                case 'g': case 'G': case '9': emptyRejectFolder(); break;
            }
        });

        function toggleSortOrder() {
            const btn = document.getElementById('btn-sort');
            if (currentSortOrder === 'name') {
                currentSortOrder = 'createdTime desc'; // Organiza da mais nova para a mais antiga
                btn.innerHTML = '📅 DATA';
            } else {
                currentSortOrder = 'name'; // Volta para ordem alfabética
                btn.innerHTML = '🔤 A-Z';
            }
            // Recarrega a pasta inteira aplicando o novo filtro
            reloadFolder(); 
        }

        function getActiveFolderId() {
            if (activeFolderKey === 'source') return FOLDERS['source'];
            if (activeFolderKey === 'manter') return FOLDERS[3];
            if (activeFolderKey === 'top') return FOLDERS[5];
            return FOLDERS['source']; 
        }

        async function fetchTotalCount() {
            let count = 0;
            let pageToken = null;
            const currentId = getActiveFolderId();
            const query = `'${currentId}' in parents and mimeType contains 'image/' and trashed = false`;
            const countDisplay = document.getElementById('photo-count');
            countDisplay.innerText = "...";
            
            try {
                do {
                    const response = await gapi.client.drive.files.list({
                        q: query, pageSize: 1000, fields: 'nextPageToken, files(id)', 
                        pageToken: pageToken, orderBy: currentSortOrder 
                    });
                    if (response.result.files) count += response.result.files.length;
                    pageToken = response.result.nextPageToken;
                } while (pageToken);
                
                totalPhotosInFolder = count;
                updateCounterDisplay();
            } catch (e) { countDisplay.innerText = "?"; }
        }

        function updateCounterDisplay() { document.getElementById('photo-count').innerText = totalPhotosInFolder; }

        async function listPhotos() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('end-screen').style.display = 'none';

            const currentId = getActiveFolderId();
            const query = `'${currentId}' in parents and mimeType contains 'image/' and trashed = false`;
            const requestParams = {
                'pageSize': 100, 
                'fields': 'nextPageToken, files(id, thumbnailLink, parents)', 
                'q': query,
                'orderBy': currentSortOrder 
            };

            if (nextPageToken) requestParams.pageToken = nextPageToken;
            
            try {
                const response = await gapi.client.drive.files.list(requestParams);
                nextPageToken = response.result.nextPageToken || null;
                addCardsToStack(response.result.files);
            } catch (e) { console.error("Error fetching:", e); } 
            finally { isFetching = false; }
        }

        function addCardsToStack(files) {
            const container = document.getElementById('catalog-container');
            const endScreen = document.getElementById('end-screen');

            if (!files || files.length === 0) { 
                if (getVisibleCards().length === 0) endScreen.style.display = 'flex';
                return; 
            }

            let addedCount = 0;
            files.forEach((file) => {
                if (processedIds.has(file.id)) return;
                processedIds.add(file.id);
                addedCount++;

                const card = createCardElement(file.id, file.thumbnailLink.replace('=s220', '=s800'));
                container.appendChild(card);
            });

            updateCardsVisibility();

            if (addedCount === 0 && getVisibleCards().length === 0) {
                if (nextPageToken) listPhotos();
                else endScreen.style.display = 'flex';
            }
        }

        function createCardElement(fileId, imgUrl) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.fileId = fileId; 
            card.innerHTML = `<img src="${imgUrl}">`;
            return card;
        }

        // --- LÓGICA DE AÇÃO DESACOPLADA E ASSÍNCRONA ---
        function handleGlobalAction(targetRating) {
            const activeCard = getActiveCard();
            if (!activeCard) return;
            const fileId = activeCard.dataset.fileId;
            
            let x = 0, y = 0;
            if (targetRating === 1) { x = -500; y = 100; } 
            else { x = 500; y = 100; } 
            
            let targetFolderId = FOLDERS[targetRating];
            if (activeFolderKey === 'manter' && targetRating === 3) targetFolderId = FOLDERS['source'];
            if (activeFolderKey === 'top' && targetRating === 5) targetFolderId = FOLDERS['source'];

            animateOut(activeCard, fileId, targetFolderId, x, y);
        }

       function animateOut(el, fileId, targetFolderId, x, y) {
            // 1. Marca imediatamente para remoção visual e aplica animação
            el.classList.add('animating'); 
            el.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`;
            el.style.opacity = '0';
            const imgUrl = el.querySelector('img').src;
            const originFolderId = getActiveFolderId(); 
            
            // 2. Atualiza a UI (próxima foto + contador) de forma 100% síncrona
            updateCardsVisibility(); 
            if (totalPhotosInFolder > 0) totalPhotosInFolder--;
            updateCounterDisplay();

            // Salva histórico local
            actionHistory.push({ fileId: fileId, destination: targetFolderId, origin: originFolderId, imgUrl: imgUrl });
            updateUndoButtonState();

            // 3. Remove a DIV do DOM quando a animação CSS termina
            setTimeout(() => {
                el.remove();
                checkAndFetchMore();
            }, 200);

            // 4. DISPARA PARA O GOOGLE DRIVE (A CORREÇÃO ESTÁ AQUI)
            if (targetFolderId !== originFolderId) {
                gapi.client.drive.files.update({
                    fileId: fileId, 
                    addParents: targetFolderId, 
                    removeParents: originFolderId,
                    fields: 'id' // Força a API a executar na hora
                }).then(function(response) {
                    console.log("Arquivo movido no Drive com sucesso!", response);
                }).catch(function(e) {
                    console.error("Erro na API ao mover a imagem:", e);
                });
            }
        }

        async function undoLastAction() {
            if (actionHistory.length === 0) return;
            const lastAction = actionHistory.pop();
            updateUndoButtonState();

            // 1. Atualiza UI localmente se a foto pertencer à aba atual
            if (lastAction.origin === getActiveFolderId()) {
                totalPhotosInFolder++;
                updateCounterDisplay();
                
                processedIds.delete(lastAction.fileId);
                document.getElementById('end-screen').style.display = 'none';

                const container = document.getElementById('catalog-container');
                const card = createCardElement(lastAction.fileId, lastAction.imgUrl);
                
                card.style.transform = 'translateY(-100px) scale(0.9)'; 
                card.style.opacity = '0';
                
                const activeCard = getActiveCard();
                if (activeCard) {
                    container.insertBefore(card, activeCard);
                } else {
                    container.appendChild(card);
                }

                updateCardsVisibility();

                // 1. Força o navegador a recalcular a tela (reflow crucial para a animação funcionar)
                void card.offsetWidth;
            
                // 2. Aplica a transição
                card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                card.style.transform = 'translateY(0) scale(1)';
                card.style.opacity = '1';
            } // <- O erro estava aqui. Agora tem apenas a chave fechando o bloco do 'if'.

            // 2. DISPARA O DESFAZER PARA O GOOGLE DRIVE
            gapi.client.drive.files.update({
                fileId: lastAction.fileId, 
                addParents: lastAction.origin, 
                removeParents: lastAction.destination,
                fields: 'id'
            }).then(function(response) {
                console.log("Ação desfeita no Drive!", response);
            }).catch(function(e) {
                console.error("Erro na API de Undo:", e);
            });
        }

        function updateUndoButtonState() {
            const undoBtn = document.getElementById('undo_button');
            undoBtn.style.visibility = (actionHistory.length > 0) ? 'visible' : 'hidden';
        }

        function checkAndFetchMore() {
            const remainingCards = getVisibleCards().length;
            if (remainingCards <= 50 && nextPageToken) listPhotos();
            else if (remainingCards === 0 && !nextPageToken) {
                document.getElementById('end-screen').style.display = 'flex';
            }
        }

        function reloadFolder() {
            loadActiveFolder();
        }

        async function emptyRejectFolder() {
            const rejectFolderId = FOLDERS[1];
            let pageToken = null;
            const query = `'${rejectFolderId}' in parents and trashed = false`;
            
            const trashBtn = document.getElementById('tab-trash');
            const originalText = trashBtn.innerHTML;
            
            let deletedCount = 0; // Inicializa o contador de arquivos
            
            try {
                // Muda o ícone para indicar que está processando
                trashBtn.innerHTML = "⏳";
                trashBtn.disabled = true;
                trashBtn.style.opacity = "0.5";

                do {
                    // Busca os arquivos na pasta Reject
                    const response = await gapi.client.drive.files.list({
                        q: query,
                        fields: 'nextPageToken, files(id)',
                        pageToken: pageToken
                    });
                    
                    const files = response.result.files;
                    if (files && files.length > 0) {
                        deletedCount += files.length; // Soma a quantidade de arquivos deste lote

                        // Envia todos os arquivos da página atual para a lixeira
                        const deletePromises = files.map(file => 
                            gapi.client.drive.files.update({
                                fileId: file.id,
                                resource: { trashed: true }                            
                            })
                        );
                        // Aguarda terminar esse lote antes de ir para a próxima página
                        await Promise.all(deletePromises);
                    }
                    pageToken = response.result.nextPageToken;
                } while (pageToken);

                // Exibe a mensagem final com a contagem exata
                if (deletedCount > 0) {
                    alert(`${deletedCount} arquivo(s) enviado(s) para a lixeira com sucesso.`);
                } else {
                    alert("A pasta Reject já estava vazia.");
                }

            } catch (e) {
                console.error("Erro ao esvaziar a pasta Reject:", e);
                alert("Ocorreu um erro ao tentar esvaziar a pasta.");
            } finally {
                // Restaura o botão da lixeira ao estado normal
                trashBtn.innerHTML = originalText;
                trashBtn.disabled = false;
                trashBtn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
