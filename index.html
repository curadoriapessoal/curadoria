<!DOCTYPE html>
<html lang="en">
<head>
    <title>Curator Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    
    <style>
        /* Layout Full Black & Centered */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #auth_button { 
            padding: 20px 40px; 
            background: #fff; 
            border: none;
            border-radius: 50px; 
            font-weight: bold;
            cursor: pointer;
            color: #000;
            box-shadow: 0 6px 0 #ccc, 0 10px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }
        #auth_button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #ccc, 0 4px 6px rgba(0,0,0,0.5);
        }

        /* Container da Foto */
        #catalog-container { 
            position: relative; 
            width: 95vw; 
            max-width: 600px; 
            aspect-ratio: 1 / 1; 
            display: none;
            transition: opacity 0.3s ease; 
            transform: translateY(-10vh);
        }

        /* Mostrador Minimalista Alinhado (Apenas Números) */
        #photo-count {
            position: absolute;
            top: -10%; /* 10% acima da foto */
            right: 0;  /* Alinhado à direita */
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            z-index: 1000;
            display: none; /* Só exibe depois do login */
        }

        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: #000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .card img { 
            width: 100%; 
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* ---------------------------------------------------
           LAYOUT INFERIOR (CONTROLES SÓLIDOS 3D)
           --------------------------------------------------- */
        
        #bottom-area {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 15px);
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            z-index: 999999;
            pointer-events: none; 
        }

        #controls-wrapper {
            display: none; 
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            pointer-events: none;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
        }

        .right-panel {
            display: flex;
            flex-direction: row;
            gap: 10px;
            pointer-events: auto;
        }

        /* Estilo Base Sólido 3D */
        .solid-btn {
            border: none;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            touch-action: manipulation; 
        }
        
        .solid-btn:active {
            transform: translateY(6px);
        }

        /* Botões Esquerda */
        .btn-left-stack {
            width: 130px;
            height: 40px; /* Altura fixa */
            border-radius: 8px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* Botão Preto/Prata Específico */
        .btn-empty-trash {
            background: #18181b; /* Preto/Cinza bem escuro */
            border: 2px solid #a1a1aa; /* Bordas prateadas */
            box-shadow: 0 6px 0 #000, 0 10px 15px rgba(0,0,0,0.5);
        }
        .btn-empty-trash:active {
            box-shadow: 0 0px 0 #000, 0 4px 6px rgba(0,0,0,0.5);
        }

        .btn-undo { 
            background: #d97706; 
            box-shadow: 0 6px 0 #92400e, 0 10px 15px rgba(0,0,0,0.5); 
            visibility: hidden; 
        }
        .btn-undo:active { box-shadow: 0 0 0 #92400e, 0 4px 6px rgba(0,0,0,0.5); }

        .btn-sync { 
            background: #db2777; 
            box-shadow: 0 6px 0 #9d174d, 0 10px 15px rgba(0,0,0,0.5); 
        }
        .btn-sync:active { box-shadow: 0 0 0 #9d174d, 0 4px 6px rgba(0,0,0,0.5); }

        /* Botões Direita (Altura emparelhada com a esquerda: 40+12+40+12+40 = 144px) */
        .btn-right-action {
            width: 65px;
            height: 144px; /* Altura equivalente aos 3 da esquerda */
            flex-direction: column;
            border-radius: 12px;
            font-size: 0.65rem;
            gap: 8px;
        }
        .btn-right-action .icon { font-size: 1.4rem; }
        
        .btn-red { 
            background: #dc2626; 
            box-shadow: 0 6px 0 #991b1b, 0 10px 15px rgba(0,0,0,0.5); 
        }
        .btn-red:active { box-shadow: 0 0 0 #991b1b, 0 4px 6px rgba(0,0,0,0.5); }
        
        .btn-blue { 
            background: #2563eb; 
            box-shadow: 0 6px 0 #1e40af, 0 10px 15px rgba(0,0,0,0.5); 
        }
        .btn-blue:active { box-shadow: 0 0 0 #1e40af, 0 4px 6px rgba(0,0,0,0.5); }
        
        .btn-green { 
            background: #16a34a; 
            box-shadow: 0 6px 0 #166534, 0 10px 15px rgba(0,0,0,0.5); 
        }
        .btn-green:active { box-shadow: 0 0 0 #166534, 0 4px 6px rgba(0,0,0,0.5); }

        /* Linha inferior (Botão Privacidade) */
        #hide-strip {
            display: none; 
            justify-content: center;
            width: 100%;
            pointer-events: none;
        }

        #hide-btn {
            background: #4b5563; 
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #374151, 0 10px 15px rgba(0,0,0,0.5);
            pointer-events: auto; 
            touch-action: manipulation;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }
        #hide-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #374151, 0 4px 6px rgba(0,0,0,0.5);
        }

        /* Fim / Vazio */
        #end-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 0;
        }
        #empty-message { font-size: 1.2rem; color: #888; text-align: center; margin-bottom: 10px;}
        
        .btn-second-filter {
            width: auto;
            height: auto;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            pointer-events: auto;
        }

    </style>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">OPEN INBOX</button>
    
    <div id="catalog-container">
        
        <div id="photo-count">...</div>

        <div id="end-screen">
            <div id="empty-message">All clear!</div>
            <button id="second_filter_btn" class="solid-btn btn-blue btn-second-filter" onclick="startSecondFilter()">
                🔄 Pull Organize (2nd Filter)
            </button>
        </div>
    </div>

    <div id="bottom-area">
        
        <div id="controls-wrapper">
            <div class="left-panel">
                <button id="empty_trash_btn" class="solid-btn btn-left-stack btn-empty-trash" onclick="emptyTrashFolder()">🗑 Empty Trash</button>
                <button id="undo_button" class="solid-btn btn-left-stack btn-undo" onclick="undoLastAction()">↩ Undo</button>
                <button class="solid-btn btn-left-stack btn-sync" onclick="reloadFolder()">🔄 Sync</button>
            </div>
            
            <div class="right-panel">
                <button class="solid-btn btn-right-action btn-red" onclick="handleGlobalAction(1)">
                    <span class="icon">✖</span> Delete
                </button>
                <button class="solid-btn btn-right-action btn-blue" onclick="handleGlobalAction(3)">
                    <span class="icon">📁</span> Organize
                </button>
                <button class="solid-btn btn-right-action btn-green" onclick="handleGlobalAction(5)">
                    <span class="icon">★</span> Special
                </button>
            </div>
        </div>

        <div id="hide-strip">
            <button id="hide-btn" onclick="toggleVisibility()">Privacy</button>
        </div>
        
    </div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive'; 
        
        const SOURCE_FOLDER_ID = '1C0Kt0kLFr_Ka4XK-UhRfquwxhysXbyTd'; 
        const FOLDER_DESTINATIONS = {
            1: '1JFV-aW8cl_wb1uE2St4-rrv78t2NwvZH', // Delete
            3: '1HwsVXHF9I6tA5RfzmDT7L9BBo84lTJTL', // Organize
            5: '1Auv1qacvBwtQBIZSNJvkblm5XogsSxo_'  // Special
        };

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        let nextPageToken = null;
        let isFetching = false;
        let currentZIndex = 100000; 
        let undoZIndex = 200000; 
        
        const processedIds = new Set(); 
        let actionHistory = []; 
        let totalPhotosInFolder = 0; 
        let isScreenHidden = false;

        function gapiLoaded() { gapi.load('client', () => {
            gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] })
            .then(() => { gapiInited = true; maybeEnableButtons(); });
        });}

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                document.getElementById('auth_button').style.display = 'none';
                document.getElementById('catalog-container').style.display = 'block';
                document.getElementById('controls-wrapper').style.display = 'flex'; 
                document.getElementById('hide-strip').style.display = 'flex'; 
                document.getElementById('photo-count').style.display = 'block'; 
                
                fetchTotalCount();
                await listPhotos();
            };
            
            tokenClient.requestAccessToken(); 
        }

        function toggleVisibility() {
            const container = document.getElementById('catalog-container');
            isScreenHidden = !isScreenHidden;
            container.style.opacity = isScreenHidden ? '0.01' : '1';
        }

        async function fetchTotalCount() {
            let count = 0;
            let pageToken = null;
            const query = `'${SOURCE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`;
            const countDisplay = document.getElementById('photo-count');
            countDisplay.innerText = "...";
            
            try {
                do {
                    const response = await gapi.client.drive.files.list({
                        q: query, 
                        pageSize: 1000, 
                        fields: 'nextPageToken, files(id)', 
                        pageToken: pageToken,
                        orderBy: 'name' // Garante alinhamento A-Z
                    });
                    if (response.result.files) count += response.result.files.length;
                    pageToken = response.result.nextPageToken;
                } while (pageToken);
                
                totalPhotosInFolder = count;
                updateCounterDisplay();
            } catch (e) { countDisplay.innerText = "?"; }
        }

        function updateCounterDisplay() { document.getElementById('photo-count').innerText = totalPhotosInFolder; }

        async function listPhotos() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('end-screen').style.display = 'none';

            const query = `'${SOURCE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`;
            const requestParams = {
                'pageSize': 100, 
                'fields': 'nextPageToken, files(id, thumbnailLink, parents, name)', 
                'q': query,
                'orderBy': 'name' // Organização A-Z principal
            };

            if (nextPageToken) requestParams.pageToken = nextPageToken;
            
            try {
                const response = await gapi.client.drive.files.list(requestParams);
                nextPageToken = response.result.nextPageToken || null;
                addCardsToStack(response.result.files);
            } catch (e) { console.error("Error fetching:", e); } 
            finally { isFetching = false; }
        }

        function addCardsToStack(files) {
            const container = document.getElementById('catalog-container');
            const endScreen = document.getElementById('end-screen');

            if (!files || files.length === 0) { 
                if (document.querySelectorAll('.card').length === 0) {
                    endScreen.style.display = 'flex';
                    document.getElementById('second_filter_btn').innerHTML = "🔄 Pull Organize (2nd Filter)";
                }
                return; 
            }

            let addedCount = 0;
            files.forEach((file) => {
                if (processedIds.has(file.id)) return;
                processedIds.add(file.id);
                addedCount++;

                const card = createCardElement(file.id, file.thumbnailLink.replace('=s220', '=s800'));
                card.style.zIndex = currentZIndex--; 
                container.appendChild(card);
            });

            if (addedCount === 0 && document.querySelectorAll('.card').length === 0) {
                if (nextPageToken) listPhotos();
                else endScreen.style.display = 'flex';
            }
        }

        function createCardElement(fileId, imgUrl) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.fileId = fileId; 
            card.innerHTML = `<img src="${imgUrl}">`;
            return card;
        }

        function getTopCard() {
            const cards = Array.from(document.querySelectorAll('.card'));
            if(cards.length === 0) return null;
            cards.sort((a, b) => parseInt(b.style.zIndex) - parseInt(a.style.zIndex));
            return cards[0];
        }

        function handleGlobalAction(rating) {
            const topCard = getTopCard();
            if (!topCard) return;
            const fileId = topCard.dataset.fileId;
            
            let x = 0, y = 0;
            if (rating === 1) { x = -500; y = 100; } // Delete (Esquerda)
            else if (rating === 5) { x = 500; y = 100; } // Special (Direita)
            else if (rating === 3) { x = 500; y = 100; } // Organize (MUDADO: Agora vai para Direita também)
            
            animateOut(topCard, fileId, rating, x, y);
        }

        function animateOut(el, fileId, rating, x, y) {
            el.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`;
            el.style.opacity = '0';
            const imgUrl = el.querySelector('img').src;
            
            setTimeout(() => {
                el.remove();
                checkAndFetchMore();
            }, 200);

            const newParent = FOLDER_DESTINATIONS[rating];
            gapi.client.drive.files.update({
                fileId: fileId, addParents: newParent, removeParents: SOURCE_FOLDER_ID
            }).then(() => {
                actionHistory.push({ fileId: fileId, destination: newParent, imgUrl: imgUrl });
                updateUndoButtonState();
                
                if (totalPhotosInFolder > 0) totalPhotosInFolder--;
                updateCounterDisplay();
            }).catch(e => {
                console.error("API error moving image:", e);
            });
        }

        async function undoLastAction() {
            if (actionHistory.length === 0) return;
            
            const lastAction = actionHistory.pop();
            updateUndoButtonState();

            try {
                await gapi.client.drive.files.update({
                    fileId: lastAction.fileId, addParents: SOURCE_FOLDER_ID, removeParents: lastAction.destination
                });
                totalPhotosInFolder++;
                updateCounterDisplay();
            } catch (e) {
                alert("Could not return the file to the origin folder.");
                return; 
            }

            processedIds.delete(lastAction.fileId);
            document.getElementById('end-screen').style.display = 'none';

            const container = document.getElementById('catalog-container');
            const card = createCardElement(lastAction.fileId, lastAction.imgUrl);
            
            card.style.zIndex = undoZIndex++; 
            card.style.transform = 'translateY(-100px) scale(0.9)'; 
            card.style.opacity = '0';
            container.appendChild(card);

            requestAnimationFrame(() => {
                card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                card.style.transform = 'translateY(0) scale(1)';
                card.style.opacity = '1';
            });
        }

        function updateUndoButtonState() {
            const undoBtn = document.getElementById('undo_button');
            undoBtn.style.visibility = (actionHistory.length > 0) ? 'visible' : 'hidden';
        }

        function checkAndFetchMore() {
            const remainingCards = document.querySelectorAll('.card').length;
            if (remainingCards <= 50 && nextPageToken) listPhotos();
            else if (remainingCards === 0 && !nextPageToken) document.getElementById('end-screen').style.display = 'flex';
        }

        function reloadFolder() {
            const container = document.getElementById('catalog-container');
            container.querySelectorAll('.card').forEach(c => c.remove());
            
            nextPageToken = null; 
            processedIds.clear();
            actionHistory = []; 
            updateUndoButtonState();
            
            document.getElementById('end-screen').style.display = 'none'; 
            fetchTotalCount();
            listPhotos(); 
        }

        async function emptyTrashFolder() {
            const trashFolderId = FOLDER_DESTINATIONS[1];
            
            if (!confirm("Are you sure you want to PERMANENTLY DELETE all files from the 'Delete' folder? This action cannot be undone.")) {
                return;
            }

            const btn = document.getElementById('empty_trash_btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ DELETING...";
            btn.style.pointerEvents = "none"; 

            try {
                let hasMore = true;
                let pageToken = null;
                let deletedCount = 0;

                while (hasMore) {
                    const response = await gapi.client.drive.files.list({
                        q: `'${trashFolderId}' in parents and trashed = false`,
                        fields: 'nextPageToken, files(id)',
                        pageSize: 100, 
                        pageToken: pageToken
                    });

                    const files = response.result.files;
                    if (files && files.length > 0) {
                        for (const file of files) {
                            await gapi.client.drive.files.delete({ fileId: file.id });
                            deletedCount++;
                        }
                    }

                    pageToken = response.result.nextPageToken;
                    if (!pageToken) hasMore = false; 
                }
                
                actionHistory = actionHistory.filter(action => action.destination !== trashFolderId);
                updateUndoButtonState();

                alert(`Success! ${deletedCount} files were permanently deleted.`);
                
            } catch (e) {
                console.error("Error emptying trash:", e);
                alert("An error occurred while deleting files. Check your permissions.");
            } finally {
                btn.innerHTML = originalText;
                btn.style.pointerEvents = "auto";
            }
        }

        async function startSecondFilter() {
            const folder3Id = FOLDER_DESTINATIONS[3];
            const btn = document.getElementById('second_filter_btn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = "⏳ PULLING FILES...";
            btn.style.pointerEvents = "none";

            try {
                let hasMore = true;
                let pageToken = null;
                let movedCount = 0;

                while (hasMore) {
                    const response = await gapi.client.drive.files.list({
                        q: `'${folder3Id}' in parents and trashed = false`,
                        fields: 'nextPageToken, files(id)',
                        pageSize: 100,
                        pageToken: pageToken
                    });

                    const files = response.result.files;
                    if (files && files.length > 0) {
                        for (const file of files) {
                            await gapi.client.drive.files.update({
                                fileId: file.id,
                                addParents: SOURCE_FOLDER_ID,
                                removeParents: folder3Id
                            });
                            movedCount++;
                        }
                    }

                    pageToken = response.result.nextPageToken;
                    if (!pageToken) {
                        hasMore = false;
                    }
                }

                if (movedCount > 0) {
                    alert(`Done! ${movedCount} files from Organize returned to origin. 2nd filter starting.`);
                    reloadFolder(); 
                } else {
                    alert("The 'Organize' folder (3) is also empty. Nothing to filter.");
                    btn.innerHTML = originalText;
                    btn.style.pointerEvents = "auto";
                }

            } catch (e) {
                console.error("Error pulling files for 2nd filter:", e);
                alert("A communication error occurred with Google Drive while moving files.");
                btn.innerHTML = originalText;
                btn.style.pointerEvents = "auto";
            }
        }
    </script>
</body>
</html>
