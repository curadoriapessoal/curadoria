<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Curadoria Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    
    <style>
        /* Layout Full Black & Centered */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #auth_button { 
            padding: 20px 40px; 
            background: #fff; 
            border-radius: 50px; 
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }

        /* Contador no Topo */
        #top-counter {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 999999;
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ccc;
            display: none; 
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #top-counter span { color: #fff; font-size: 1rem; margin-left: 5px; }

        /* Container da Foto */
        #catalog-container { 
            position: relative; 
            width: 95vw; 
            max-width: 600px; 
            aspect-ratio: 1 / 1; 
            display: none;
            transition: opacity 0.3s ease; 
            transform: translateY(-10vh);
        }

        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: #000;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .card img { 
            width: 100%; 
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* ---------------------------------------------------
           NOVO LAYOUT INFERIOR (CONTROLES + OCULTAR TELA)
           --------------------------------------------------- */
        
        #bottom-area {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 15px);
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            z-index: 999999;
            pointer-events: none; 
        }

        /* Linha superior (Botões Principais) */
        #controls-wrapper {
            display: none; 
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            pointer-events: none;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
        }

        .right-panel {
            display: flex;
            flex-direction: row;
            gap: 10px;
            pointer-events: auto;
        }

        /* Estilo Base Liquid Glass */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.1s ease;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            touch-action: manipulation; 
        }

        .glass-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.25);
        }

        /* Botões Esquerda */
        .btn-left-stack {
            width: 130px;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* NOVO BOTÃO: Preto com borda prata 3D */
        .btn-empty-trash {
            background: linear-gradient(145deg, #2a2a2a, #000000);
            border: 2px solid #a8a8a8;
            border-top: 2px solid #e0e0e0;
            border-left: 2px solid #e0e0e0;
            border-bottom: 2px solid #555555;
            border-right: 2px solid #555555;
            color: #ffffff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.8), inset 2px 2px 5px rgba(255,255,255,0.2), inset -2px -2px 5px rgba(0,0,0,0.5);
            text-shadow: 0 1px 3px #000;
            transition: all 0.1s ease;
        }
        .btn-empty-trash:active {
            transform: scale(0.92) translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.8), inset 2px 2px 8px rgba(0,0,0,0.8);
        }

        .btn-undo { background: rgba(255, 193, 7, 0.15); border-color: rgba(255, 193, 7, 0.3); visibility: hidden; }
        .btn-sync { background: rgba(232, 62, 140, 0.15); border-color: rgba(232, 62, 140, 0.3); }

        /* Botões Direita */
        .btn-right-action {
            width: 65px;
            height: 80px;
            flex-direction: column;
            border-radius: 16px;
            font-size: 0.65rem;
            gap: 8px;
        }
        .btn-right-action .icon { font-size: 1.4rem; }
        
        .btn-red   { background: rgba(220, 53, 69, 0.2);  border-color: rgba(220, 53, 69, 0.4); }
        .btn-blue  { background: rgba(13, 110, 253, 0.2); border-color: rgba(13, 110, 253, 0.4); }
        .btn-green { background: rgba(40, 167, 69, 0.2);  border-color: rgba(40, 167, 69, 0.4); }

        /* Linha inferior (Botão Ocultar Tela) */
        #hide-strip {
            display: none; 
            justify-content: center;
            width: 100%;
            pointer-events: none;
        }

        #hide-btn {
            background: rgba(128, 128, 128, 0.5); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto; 
            touch-action: manipulation;
        }

        /* Fim / Vazio */
        #end-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 0;
        }
        #empty-message { font-size: 1.2rem; color: #888; text-align: center; }
    </style>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">COMEÇAR CURADORIA</button>
    
    <div id="top-counter">RESTANTES: <span id="photo-count">...</span></div>

    <div id="catalog-container">
        <div id="end-screen">
            <div id="empty-message">Tudo limpo por aqui!</div>
        </div>
    </div>

    <div id="bottom-area">
        
        <div id="controls-wrapper">
            <div class="left-panel">
                <button id="empty_trash_btn" class="glass-btn btn-left-stack btn-empty-trash" onclick="emptyTrashFolder()">🗑 Limpar Lixeira</button>
                <button id="undo_button" class="glass-btn btn-left-stack btn-undo" onclick="undoLastAction()">↩ Desfazer</button>
                <button class="glass-btn btn-left-stack btn-sync" onclick="reloadFolder()">🔄 Sincronizar</button>
            </div>
            
            <div class="right-panel">
                <button class="glass-btn btn-right-action btn-red" onclick="handleGlobalAction(1)">
                    <span class="icon">✖</span> Excluir
                </button>
                <button class="glass-btn btn-right-action btn-blue" onclick="handleGlobalAction(3)">
                    <span class="icon">📁</span> Organizar
                </button>
                <button class="glass-btn btn-right-action btn-green" onclick="handleGlobalAction(5)">
                    <span class="icon">★</span> Especial
                </button>
            </div>
        </div>

        <div id="hide-strip">
            <button id="hide-btn" onclick="toggleVisibility()">Privacidade</button>
        </div>
        
    </div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive'; 
        
        const SOURCE_FOLDER_ID = '1C0Kt0kLFr_Ka4XK-UhRfquwxhysXbyTd'; 
        const FOLDER_DESTINATIONS = {
            1: '1JFV-aW8cl_wb1uE2St4-rrv78t2NwvZH', // Excluir
            3: '1HwsVXHF9I6tA5RfzmDT7L9BBo84lTJTL', // Organizar
            5: '1Auv1qacvBwtQBIZSNJvkblm5XogsSxo_'  // Especial
        };

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        let nextPageToken = null;
        let isFetching = false;
        let currentZIndex = 100000; 
        let undoZIndex = 200000; 
        
        const processedIds = new Set(); 
        let actionHistory = []; 
        let totalPhotosInFolder = 0; 
        let isScreenHidden = false;

        function gapiLoaded() { gapi.load('client', () => {
            gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] })
            .then(() => { gapiInited = true; maybeEnableButtons(); });
        });}

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                document.getElementById('auth_button').style.display = 'none';
                document.getElementById('catalog-container').style.display = 'block';
                document.getElementById('controls-wrapper').style.display = 'flex'; 
                document.getElementById('hide-strip').style.display = 'flex'; 
                document.getElementById('top-counter').style.display = 'block'; 
                
                fetchTotalCount();
                await listPhotos();
            };
            
            tokenClient.requestAccessToken(); 
        }

        function toggleVisibility() {
            const container = document.getElementById('catalog-container');
            isScreenHidden = !isScreenHidden;
            container.style.opacity = isScreenHidden ? '0.01' : '1';
        }

        async function fetchTotalCount() {
            let count = 0;
            let pageToken = null;
            const query = `'${SOURCE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`;
            const countDisplay = document.getElementById('photo-count');
            countDisplay.innerText = "Calculando...";
            
            try {
                do {
                    const response = await gapi.client.drive.files.list({
                        q: query, pageSize: 1000, fields: 'nextPageToken, files(id)', pageToken: pageToken
                    });
                    if (response.result.files) count += response.result.files.length;
                    pageToken = response.result.nextPageToken;
                } while (pageToken);
                
                totalPhotosInFolder = count;
                updateCounterDisplay();
            } catch (e) { countDisplay.innerText = "?"; }
        }

        function updateCounterDisplay() { document.getElementById('photo-count').innerText = totalPhotosInFolder; }

        async function listPhotos() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('end-screen').style.display = 'none';

            const query = `'${SOURCE_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`;
            const requestParams = {
                'pageSize': 100, 
                'fields': 'nextPageToken, files(id, thumbnailLink, parents)', 
                'q': query
            };

            if (nextPageToken) requestParams.pageToken = nextPageToken;
            
            try {
                const response = await gapi.client.drive.files.list(requestParams);
                nextPageToken = response.result.nextPageToken || null;
                addCardsToStack(response.result.files);
            } catch (e) { console.error("Erro na busca:", e); } 
            finally { isFetching = false; }
        }

        function addCardsToStack(files) {
            const container = document.getElementById('catalog-container');
            const endScreen = document.getElementById('end-screen');

            if (!files || files.length === 0) { 
                if (document.querySelectorAll('.card').length === 0) endScreen.style.display = 'flex';
                return; 
            }

            let addedCount = 0;
            files.forEach((file) => {
                if (processedIds.has(file.id)) return;
                processedIds.add(file.id);
                addedCount++;

                const card = createCardElement(file.id, file.thumbnailLink.replace('=s220', '=s800'));
                card.style.zIndex = currentZIndex--; 
                container.appendChild(card);
            });

            if (addedCount === 0 && document.querySelectorAll('.card').length === 0) {
                if (nextPageToken) listPhotos();
                else endScreen.style.display = 'flex';
            }
        }

        function createCardElement(fileId, imgUrl) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.fileId = fileId; 
            card.innerHTML = `<img src="${imgUrl}">`;
            return card;
        }

        function getTopCard() {
            const cards = Array.from(document.querySelectorAll('.card'));
            if(cards.length === 0) return null;
            cards.sort((a, b) => parseInt(b.style.zIndex) - parseInt(a.style.zIndex));
            return cards[0];
        }

        function handleGlobalAction(rating) {
            const topCard = getTopCard();
            if (!topCard) return;
            const fileId = topCard.dataset.fileId;
            
            let x = 0, y = 0;
            if (rating === 1) { x = -500; y = 100; } 
            else if (rating === 5) { x = 500; y = 100; } 
            else if (rating === 3) { x = 0; y = -500; } 
            
            animateOut(topCard, fileId, rating, x, y);
        }

        function animateOut(el, fileId, rating, x, y) {
            el.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`;
            el.style.opacity = '0';
            const imgUrl = el.querySelector('img').src;
            
            setTimeout(() => {
                el.remove();
                checkAndFetchMore();
            }, 200);

            const newParent = FOLDER_DESTINATIONS[rating];
            gapi.client.drive.files.update({
                fileId: fileId, addParents: newParent, removeParents: SOURCE_FOLDER_ID
            }).then(() => {
                actionHistory.push({ fileId: fileId, destination: newParent, imgUrl: imgUrl });
                updateUndoButtonState();
                
                if (totalPhotosInFolder > 0) totalPhotosInFolder--;
                updateCounterDisplay();
            }).catch(e => {
                console.error("Erro ao mover imagem na API:", e);
            });
        }

        async function undoLastAction() {
            if (actionHistory.length === 0) return;
            
            const lastAction = actionHistory.pop();
            updateUndoButtonState();

            try {
                await gapi.client.drive.files.update({
                    fileId: lastAction.fileId, addParents: SOURCE_FOLDER_ID, removeParents: lastAction.destination
                });
                totalPhotosInFolder++;
                updateCounterDisplay();
            } catch (e) {
                alert("Não foi possível devolver o arquivo à origem no Drive.");
                return; 
            }

            processedIds.delete(lastAction.fileId);
            document.getElementById('end-screen').style.display = 'none';

            const container = document.getElementById('catalog-container');
            const card = createCardElement(lastAction.fileId, lastAction.imgUrl);
            
            card.style.zIndex = undoZIndex++; 
            card.style.transform = 'translateY(-100px) scale(0.9)'; 
            card.style.opacity = '0';
            container.appendChild(card);

            requestAnimationFrame(() => {
                card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                card.style.transform = 'translateY(0) scale(1)';
                card.style.opacity = '1';
            });
        }

        function updateUndoButtonState() {
            const undoBtn = document.getElementById('undo_button');
            undoBtn.style.visibility = (actionHistory.length > 0) ? 'visible' : 'hidden';
        }

        function checkAndFetchMore() {
            const remainingCards = document.querySelectorAll('.card').length;
            if (remainingCards <= 50 && nextPageToken) listPhotos();
            else if (remainingCards === 0 && !nextPageToken) document.getElementById('end-screen').style.display = 'flex';
        }

        function reloadFolder() {
            const container = document.getElementById('catalog-container');
            container.querySelectorAll('.card').forEach(c => c.remove());
            
            nextPageToken = null; 
            processedIds.clear();
            actionHistory = []; 
            updateUndoButtonState();
            
            document.getElementById('end-screen').style.display = 'none'; 
            fetchTotalCount();
            listPhotos(); 
        }

        // --- NOVA FUNÇÃO: Esvaziar a Pasta "Excluir" (Pasta 1) ---
        async function emptyTrashFolder() {
            const trashFolderId = FOLDER_DESTINATIONS[1];
            
            // Pede confirmação antes de excluir as fotos
            if (!confirm("Tem certeza que deseja EXCLUIR DEFINITIVAMENTE todos os arquivos da pasta 'Excluir'? Essa ação não pode ser desfeita.")) {
                return;
            }

            const btn = document.getElementById('empty_trash_btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ APAGANDO...";
            btn.style.pointerEvents = "none"; // Desativa o botão temporariamente

            try {
                let hasMore = true;
                let pageToken = null;
                let deletedCount = 0;

                // Loop para buscar os arquivos na pasta 1 e apagar todos eles
                while (hasMore) {
                    const response = await gapi.client.drive.files.list({
                        q: `'${trashFolderId}' in parents and trashed = false`,
                        fields: 'nextPageToken, files(id)',
                        pageSize: 100, // Processa em lotes
                        pageToken: pageToken
                    });

                    const files = response.result.files;
                    if (files && files.length > 0) {
                        // Deleta arquivo por arquivo do lote atual
                        for (const file of files) {
                            await gapi.client.drive.files.delete({ fileId: file.id });
                            deletedCount++;
                        }
                    }

                    pageToken = response.result.nextPageToken;
                    if (!pageToken) {
                        hasMore = false; // Se não tem próxima página, termina o loop
                    }
                }
                
                // Limpa o histórico de "desfazer" local que aponta para arquivos da pasta 1 (já que não existem mais lá)
                actionHistory = actionHistory.filter(acao => acao.destination !== trashFolderId);
                updateUndoButtonState();

                alert(`Sucesso! ${deletedCount} arquivos foram excluídos permanentemente.`);
                
            } catch (e) {
                console.error("Erro ao limpar lixeira:", e);
                alert("Ocorreu um erro ao excluir os arquivos. Verifique se as permissões estão corretas.");
            } finally {
                // Restaura o visual do botão
                btn.innerHTML = originalText;
                btn.style.pointerEvents = "auto";
            }
        }
    </script>
</body>
</html>
