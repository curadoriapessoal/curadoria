<!DOCTYPE html>
<html lang="en">
<head>
    <title>Editing Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://accounts.google.com/gsi/client" onload="initTokenClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    
    <style>
        /* Layout Full Black & Shifted Up */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-top: 2vh; /* Reduzido para dar espaço ao menu de navegação */
        }

        #auth_button { 
            padding: 20px 40px; 
            background: #fff; 
            border: none;
            border-radius: 50px; 
            font-weight: bold;
            cursor: pointer;
            color: #000;
            box-shadow: 0 6px 0 #ccc, 0 10px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
            margin-top: 30vh; 
        }
        #auth_button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #ccc, 0 4px 6px rgba(0,0,0,0.5);
        }

        /* ---------------------------------------------------
           NAVEGAÇÃO DE PASTAS (NOVO TOP BAR)
           --------------------------------------------------- */
        #folder-nav {
            width: 100%;
            display: none; /* Aparece após o login */
            justify-content: center;
            gap: 10px;
            padding: 10px 0;
            z-index: 1001;
        }

        .folder-tab {
            background: #222;
            color: #888;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .folder-tab.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* ---------------------------------------------------
           CABEÇALHO (NOME E CONTADOR)
           --------------------------------------------------- */
        #info-bar {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column; 
            justify-content: flex-start;
            align-items: center; 
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
            pointer-events: none;
            margin-top: 5px;
        }

        #photo-count {
            font-size: 2rem; /* Levemente menor para caber com a barra de pastas */
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            display: none; 
            line-height: 1;
        }

        #photo-name {
            font-size: 0.9rem;
            color: #ccc; 
            font-weight: 500;
            max-width: 90vw;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: none;
        }

        /* ---------------------------------------------------
           CONTAINER DE CARTAS E NAVEGAÇÃO LATERAL
           --------------------------------------------------- */
        #catalog-container { 
            position: relative; 
            width: 95vw; 
            height: 55vh; /* Ajuste para não encostar na base */
            margin-top: 2vh; 
            display: none;
            transition: opacity 0.3s ease; 
        }

        @media (min-width: 768px) {
            #catalog-container { width: 50vw; }
        }

        .card { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out; 
        }

        .card img { 
            max-width: 100%; 
            max-height: 100%; 
            width: auto;
            height: auto;
            object-fit: contain; 
            pointer-events: none;
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        /* Zonas de Toque Laterais Invisíveis */
        .nav-zone {
            position: absolute;
            top: 0; bottom: 0;
            width: 35%; /* 35% de cada lado é clicável para navegar */
            display: none; /* Controlado via JS */
            align-items: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            z-index: 500000; 
            transition: background 0.2s ease, color 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #nav-left { 
            left: 0; justify-content: flex-start; padding-left: 15px; 
            background: linear-gradient(to right, rgba(0,0,0,0.3), transparent);
        }
        #nav-right { 
            right: 0; justify-content: flex-end; padding-right: 15px; 
            background: linear-gradient(to left, rgba(0,0,0,0.3), transparent);
        }

        .nav-zone:active { color: rgba(255,255,255,1); background: rgba(255,255,255,0.1); }

        /* ---------------------------------------------------
           LAYOUT INFERIOR (GLASSMORPHISM 2.0)
           --------------------------------------------------- */
        #bottom-area {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 25px); 
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            z-index: 999999;
            pointer-events: none; 
        }

        #controls-wrapper {
            display: none; 
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            pointer-events: none;
        }

        .left-panel { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .right-panel { display: flex; flex-direction: row; gap: 10px; pointer-events: auto; }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            touch-action: manipulation;
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.02) 100%);
        }

        .glass-btn:active { transform: scale(0.96) translateY(2px); background: rgba(255, 255, 255, 0.08); }

        .btn-left-stack { width: 130px; height: 40px; border-radius: 12px; font-size: 0.8rem; letter-spacing: 0.5px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-empty-trash { background: linear-gradient(145deg, #2a2a2a, #000000); border: 2px solid #a8a8a8; border-bottom: 2px solid #555555; border-right: 2px solid #555555; color: #ffffff; box-shadow: 0 6px 15px rgba(0,0,0,0.8); border-radius: 8px; }
        .btn-undo { border-color: rgba(255, 193, 7, 0.2); box-shadow: 0 4px 15px rgba(255, 193, 7, 0.1); visibility: hidden; }
        .btn-sync { border-color: rgba(232, 62, 140, 0.2); box-shadow: 0 4px 15px rgba(232, 62, 140, 0.1); }

        .btn-right-action { width: 65px; height: 144px; flex-direction: column; border-radius: 16px; font-size: 0.65rem; gap: 8px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-right-action .icon { font-size: 1.4rem; }
        
        .btn-red { border-color: rgba(220, 53, 69, 0.2); box-shadow: 0 4px 15px rgba(220, 53, 69, 0.1); }
        .btn-blue { border-color: rgba(13, 110, 253, 0.2); box-shadow: 0 4px 15px rgba(13, 110, 253, 0.1); }
        .btn-green { border-color: rgba(40, 167, 69, 0.2); box-shadow: 0 4px 15px rgba(40, 167, 69, 0.1); }

        #hide-strip { display: none; justify-content: center; width: 100%; pointer-events: none; }
        #hide-btn { background: rgba(128, 128, 128, 0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 10px 25px; border-radius: 25px; font-size: 0.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: auto; text-transform: uppercase; }

        #end-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; display: none; flex-direction: column; align-items: center; gap: 20px; z-index: 0; }
        #empty-message { font-size: 1.2rem; color: #888; text-align: center; margin-bottom: 10px;}

    </style>
</head>
<body>

    <button id="auth_button" onclick="handleAuthClick()">THE GREAT HALL</button>

    <div id="folder-nav">
        <button class="folder-tab active" onclick="switchFolder('source')" id="tab-source">Source</button>
        <button class="folder-tab" onclick="switchFolder('accio')" id="tab-accio">Accio</button>
        <button class="folder-tab" onclick="switchFolder('chosen')" id="tab-chosen">Chosen</button>
    </div>
    
    <div id="info-bar">
        <div id="photo-count">...</div>
        <div id="photo-name"></div>
    </div>

    <div id="catalog-container">
        
        <div id="nav-left" class="nav-zone" onclick="prevPhoto()">&#10094;</div>
        <div id="nav-right" class="nav-zone" onclick="nextPhoto()">&#10095;</div>

        <div id="end-screen">
            <div id="empty-message">Folder is empty!</div>
        </div>
    </div>

    <div id="bottom-area">
        <div id="controls-wrapper">
            <div class="left-panel">
                <button id="empty_trash_btn" class="btn-left-stack btn-empty-trash" onclick="emptyTrashFolder()">AVADA KEDAVRA</button>
                <button id="undo_button" class="glass-btn btn-left-stack btn-undo" onclick="undoLastAction()">↩ PRIOR</button>
                <button class="glass-btn btn-left-stack btn-sync" onclick="reloadFolder()">REVELIO</button>
            </div>
            
            <div class="right-panel">
                <button class="glass-btn btn-right-action btn-red" onclick="handleGlobalAction(1)">
                    <span class="icon">✖</span> EVANESCO
                </button>
                <button class="glass-btn btn-right-action btn-blue" onclick="handleGlobalAction(3)">
                    <span class="icon">📁</span> ACCIO
                </button>
                <button class="glass-btn btn-right-action btn-green" onclick="handleGlobalAction(5)">
                    <span class="icon">★</span> CHOSEN
                </button>
            </div>
        </div>

        <div id="hide-strip">
            <button id="hide-btn" onclick="toggleVisibility()">INVISIBILITY CLOAK</button>
        </div>
    </div>

    <script type="text/javascript">
        const CLIENT_ID = '905891014579-fjgqvkgbiucl4c0asn68pbv1p5gm6ofn.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive'; 
        
        // O dicionário agora inclui a pasta Root (Source) para facilitar a movimentação
        const FOLDERS = {
            'source': '1C0Kt0kLFr_Ka4XK-UhRfquwxhysXbyTd',
            1: '1JFV-aW8cl_wb1uE2St4-rrv78t2NwvZH', // Delete (Evanesco)
            3: '1HwsVXHF9I6tA5RfzmDT7L9BBo84lTJTL', // Organize (Accio)
            5: '1Auv1qacvBwtQBIZSNJvkblm5XogsSxo_'  // Special (Chosen)
        };

        // Estado atual de qual pasta estamos olhando
        let activeFolderKey = 'source'; 

        let tokenClient;
        let gapiInited = false;
        let gsisInited = false;

        let nextPageToken = null;
        let isFetching = false;
        let undoZIndex = 200000; 
        
        const processedIds = new Set(); 
        let actionHistory = []; 
        let totalPhotosInFolder = 0; 
        let isScreenHidden = false;
        let currentViewIndex = 0;

        function gapiLoaded() { gapi.load('client', () => {
            gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] })
            .then(() => { gapiInited = true; maybeEnableButtons(); });
        });}

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
            gsisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gsisInited) document.getElementById('auth_button').style.display = 'block';
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                document.getElementById('auth_button').style.display = 'none';
                document.getElementById('folder-nav').style.display = 'flex';
                document.getElementById('catalog-container').style.display = 'block';
                document.getElementById('controls-wrapper').style.display = 'flex'; 
                document.getElementById('hide-strip').style.display = 'flex'; 
                document.getElementById('photo-count').style.display = 'block'; 
                document.getElementById('photo-name').style.display = 'block'; 
                
                loadActiveFolder();
            };
            tokenClient.requestAccessToken(); 
        }

        function toggleVisibility() {
            const container = document.getElementById('catalog-container');
            isScreenHidden = !isScreenHidden;
            container.style.opacity = isScreenHidden ? '0.01' : '1';
        }

        // --- SISTEMA DE ABAS (TROCA DE PASTA) ---
        function switchFolder(folderKey) {
            if (activeFolderKey === folderKey) return; // Já está na pasta

            // Atualiza UI das abas
            document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + folderKey).classList.add('active');

            activeFolderKey = folderKey;
            loadActiveFolder();
        }

        function loadActiveFolder() {
            const container = document.getElementById('catalog-container');
            // Remove os cards antigos mas preserva os botões e end-screen
            container.querySelectorAll('.card').forEach(c => c.remove());
            
            nextPageToken = null; 
            currentViewIndex = 0;
            processedIds.clear();
            actionHistory = []; 
            updateUndoButtonState();
            
            document.getElementById('end-screen').style.display = 'none'; 
            fetchTotalCount();
            listPhotos();
        }

        // --- NAVEGAÇÃO LATERAL (JS) ---
        function getVisibleCards() {
            return Array.from(document.querySelectorAll('.card:not(.animating)'));
        }

        function getActiveCard() {
            const cards = getVisibleCards();
            return cards[currentViewIndex] || null;
        }

        function updateCardsVisibility() {
            const cards = getVisibleCards();
            const navLeft = document.getElementById('nav-left');
            const navRight = document.getElementById('nav-right');

            if(cards.length === 0) {
                navLeft.style.display = 'none';
                navRight.style.display = 'none';
                updateFilenameDisplay();
                return;
            }
            
            if (currentViewIndex >= cards.length) currentViewIndex = Math.max(0, cards.length - 1);
            if (currentViewIndex < 0) currentViewIndex = 0;

            cards.forEach((card, index) => {
                if (index === currentViewIndex) {
                    card.style.visibility = 'visible';
                    card.style.opacity = '1';
                } else {
                    card.style.visibility = 'hidden';
                    card.style.opacity = '0';
                }
            });

            navLeft.style.display = currentViewIndex > 0 ? 'flex' : 'none';
            navRight.style.display = (currentViewIndex < cards.length - 1 || nextPageToken) ? 'flex' : 'none';

            updateFilenameDisplay();
        }

        function prevPhoto() {
            if (currentViewIndex > 0) {
                currentViewIndex--;
                updateCardsVisibility();
            }
        }

        function nextPhoto() {
            const cards = getVisibleCards();
            if (currentViewIndex < cards.length - 1) {
                currentViewIndex++;
                updateCardsVisibility();
            } else if (nextPageToken) {
                listPhotos(); 
            }
        }

        function updateFilenameDisplay() {
            const topCard = getActiveCard();
            const nameEl = document.getElementById('photo-name');
            if (topCard) {
                nameEl.innerText = topCard.dataset.fileName || "Sem título";
            } else {
                nameEl.innerText = "Nenhuma foto";
            }
        }

        // --- ATALHOS DE TECLADO ---
        document.addEventListener('keydown', (event) => {
            if (event.repeat) return; // Evita metralhar atalhos

            switch(event.key) {
                case 'ArrowLeft': prevPhoto(); break;
                case 'ArrowRight': nextPhoto(); break;
                case 's': case 'S': handleGlobalAction(1); break;
                case 'd': case 'D': handleGlobalAction(3); break;
                case 'f': case 'F': handleGlobalAction(5); break;
                case 'a': case 'A': reloadFolder(); break;
                case 'q': case 'Q': undoLastAction(); break;
            }
        });

        // --- OPERAÇÕES NA API ---
        function getActiveFolderId() {
            if (activeFolderKey === 'source') return FOLDERS['source'];
            if (activeFolderKey === 'accio') return FOLDERS[3];
            if (activeFolderKey === 'chosen') return FOLDERS[5];
            return FOLDERS['source']; // fallback
        }

        async function fetchTotalCount() {
            let count = 0;
            let pageToken = null;
            const currentId = getActiveFolderId();
            const query = `'${currentId}' in parents and mimeType contains 'image/' and trashed = false`;
            const countDisplay = document.getElementById('photo-count');
            countDisplay.innerText = "...";
            
            try {
                do {
                    const response = await gapi.client.drive.files.list({
                        q: query, pageSize: 1000, fields: 'nextPageToken, files(id)', 
                        pageToken: pageToken, orderBy: 'name' 
                    });
                    if (response.result.files) count += response.result.files.length;
                    pageToken = response.result.nextPageToken;
                } while (pageToken);
                
                totalPhotosInFolder = count;
                updateCounterDisplay();
            } catch (e) { countDisplay.innerText = "?"; }
        }

        function updateCounterDisplay() { document.getElementById('photo-count').innerText = totalPhotosInFolder; }

        async function listPhotos() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('end-screen').style.display = 'none';

            const currentId = getActiveFolderId();
            const query = `'${currentId}' in parents and mimeType contains 'image/' and trashed = false`;
            const requestParams = {
                'pageSize': 100, 
                'fields': 'nextPageToken, files(id, thumbnailLink, parents, name)', 
                'q': query,
                'orderBy': 'name' 
            };

            if (nextPageToken) requestParams.pageToken = nextPageToken;
            
            try {
                const response = await gapi.client.drive.files.list(requestParams);
                nextPageToken = response.result.nextPageToken || null;
                addCardsToStack(response.result.files);
            } catch (e) { console.error("Error fetching:", e); } 
            finally { isFetching = false; }
        }

        function addCardsToStack(files) {
            const container = document.getElementById('catalog-container');
            const endScreen = document.getElementById('end-screen');

            if (!files || files.length === 0) { 
                if (getVisibleCards().length === 0) {
                    endScreen.style.display = 'flex';
                    updateFilenameDisplay();
                }
                return; 
            }

            let addedCount = 0;
            files.forEach((file) => {
                if (processedIds.has(file.id)) return;
                processedIds.add(file.id);
                addedCount++;

                const card = createCardElement(file.id, file.thumbnailLink.replace('=s220', '=s800'), file.name);
                container.appendChild(card);
            });

            updateCardsVisibility();

            if (addedCount === 0 && getVisibleCards().length === 0) {
                if (nextPageToken) listPhotos();
                else endScreen.style.display = 'flex';
            }
        }

        function createCardElement(fileId, imgUrl, fileName) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.fileId = fileId; 
            card.dataset.fileName = fileName; 
            card.innerHTML = `<img src="${imgUrl}">`;
            return card;
        }

        function handleGlobalAction(targetRating) {
            const activeCard = getActiveCard();
            if (!activeCard) return;
            const fileId = activeCard.dataset.fileId;
            const fileName = activeCard.dataset.fileName;
            
            // Lógica de direção visual com base na escolha
            let x = 0, y = 0;
            if (targetRating === 1) { x = -500; y = 100; } // Reject = Sai pra Esquerda
            else { x = 500; y = 100; } // Qualquer outra move = Sai pra Direita
            
            // Lógica de onde o arquivo deve ir
            // Se estou na aba Accio e aperto o botão Accio, ele joga de volta pra Source
            let targetFolderId = FOLDERS[targetRating];
            if (activeFolderKey === 'accio' && targetRating === 3) targetFolderId = FOLDERS['source'];
            if (activeFolderKey === 'chosen' && targetRating === 5) targetFolderId = FOLDERS['source'];

            animateOut(activeCard, fileId, targetFolderId, x, y, fileName);
        }

        function animateOut(el, fileId, targetFolderId, x, y, fileName) {
            el.classList.add('animating'); 
            el.style.transform = `translate(${x}px, ${y}px) rotate(${x/15}deg)`;
            el.style.opacity = '0';
            const imgUrl = el.querySelector('img').src;
            
            const originFolderId = getActiveFolderId(); // Salva de onde a foto saiu para o undo
            
            updateCardsVisibility(); 

            setTimeout(() => {
                el.remove();
                checkAndFetchMore();
            }, 200);

            // Somente acessa a API se a pasta destino for diferente da atual
            if (targetFolderId !== originFolderId) {
                gapi.client.drive.files.update({
                    fileId: fileId, addParents: targetFolderId, removeParents: originFolderId
                }).then(() => {
                    actionHistory.push({ fileId: fileId, destination: targetFolderId, origin: originFolderId, imgUrl: imgUrl, fileName: fileName });
                    updateUndoButtonState();
                    
                    if (totalPhotosInFolder > 0) totalPhotosInFolder--;
                    updateCounterDisplay();
                }).catch(e => {
                    console.error("API error moving image:", e);
                });
            }
        }

        async function undoLastAction() {
            if (actionHistory.length === 0) return;
            
            const lastAction = actionHistory.pop();
            updateUndoButtonState();

            try {
                await gapi.client.drive.files.update({
                    fileId: lastAction.fileId, addParents: lastAction.origin, removeParents: lastAction.destination
                });
                
                // Se a ação desfeita devolver a foto para a aba que estamos visualizando agora, recoloca na tela
                if (lastAction.origin === getActiveFolderId()) {
                    totalPhotosInFolder++;
                    updateCounterDisplay();
                    
                    processedIds.delete(lastAction.fileId);
                    document.getElementById('end-screen').style.display = 'none';

                    const container = document.getElementById('catalog-container');
                    const card = createCardElement(lastAction.fileId, lastAction.imgUrl, lastAction.fileName);
                    
                    card.style.transform = 'translateY(-100px) scale(0.9)'; 
                    card.style.opacity = '0';
                    
                    const activeCard = getActiveCard();
                    if (activeCard) {
                        container.insertBefore(card, activeCard);
                    } else {
                        container.appendChild(card);
                    }

                    updateCardsVisibility();

                    requestAnimationFrame(() => {
                        card.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
                        card.style.transform = 'translateY(0) scale(1)';
                        card.style.opacity = '1';
                    });
                }
            } catch (e) {
                alert("Could not return the file to the origin folder.");
                return; 
            }
        }

        function updateUndoButtonState() {
            const undoBtn = document.getElementById('undo_button');
            undoBtn.style.visibility = (actionHistory.length > 0) ? 'visible' : 'hidden';
        }

        function checkAndFetchMore() {
            const remainingCards = getVisibleCards().length;
            if (remainingCards <= 50 && nextPageToken) listPhotos();
            else if (remainingCards === 0 && !nextPageToken) {
                document.getElementById('end-screen').style.display = 'flex';
                updateFilenameDisplay();
            }
        }

        function reloadFolder() {
            loadActiveFolder();
        }

        async function emptyTrashFolder() {
            const trashFolderId = FOLDERS[1];
            
            if (!confirm("Are you sure you want to PERMANENTLY DELETE all files from the EVANESCO folder?")) {
                return;
            }

            const btn = document.getElementById('empty_trash_btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ DELETING...";
            btn.style.pointerEvents = "none"; 

            try {
                let hasMore = true;
                let pageToken = null;
                let deletedCount = 0;

                while (hasMore) {
                    const response = await gapi.client.drive.files.list({
                        q: `'${trashFolderId}' in parents and trashed = false`,
                        fields: 'nextPageToken, files(id)',
                        pageSize: 100, 
                        pageToken: pageToken
                    });

                    const files = response.result.files;
                    if (files && files.length > 0) {
                        for (const file of files) {
                            await gapi.client.drive.files.delete({ fileId: file.id });
                            deletedCount++;
                        }
                    }

                    pageToken = response.result.nextPageToken;
                    if (!pageToken) hasMore = false; 
                }
                
                actionHistory = actionHistory.filter(action => action.destination !== trashFolderId);
                updateUndoButtonState();

                alert(`Success! ${deletedCount} files were permanently deleted.`);
                
            } catch (e) {
                console.error("Error emptying trash:", e);
                alert("An error occurred while deleting files. Check your permissions.");
            } finally {
                btn.innerHTML = originalText;
                btn.style.pointerEvents = "auto";
            }
        }
    </script>
</body>
</html>
